<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Record</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a73e8;
      --primary-hover: #174ea6;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --text-muted: #5f6368;
      --input-bg: #ffffff;
      --input-border: #dadce0;
      --success: #1e8e3e;
      --error: #d93025;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', 'Roboto', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .header {
      margin-bottom: 32px;
      border-bottom: 1px solid #f1f3f4;
      padding-bottom: 16px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    p.subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .form-group {
      margin-bottom: 4px;
      position: relative;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
    }

    input:hover {
      border-color: #bdc1c6;
    }

    input::placeholder {
      color: #9aa0a6;
    }

    .button-container {
      margin-top: 40px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    button {
      padding: 12px 32px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
    }

    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26, 115, 232, 0.25);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background-color: #f1f3f4;
      color: #9aa0a6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      display: none;
      animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      min-width: 300px;
    }

    .notification.success {
      background-color: #1e8e3e;
      color: #ffffff;
    }

    .notification.error {
      background-color: #d93025;
      color: #ffffff;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Micro-interactions */
    .form-group:focus-within label {
      color: var(--primary);
    }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* For Teacher ID which is auto-filled */
    #teacherId {
      background-color: #f1f3f4;
      font-weight: 600;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>New Teacher Entry</h1>
      <p class="subtitle">Complete the form below to add a new teacher to the database.</p>
    </div>

    <form id="dataForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="teacherId">Teacher ID</label>
          <input type="text" id="teacherId" name="teacherId" placeholder="Generating..." required autocomplete="off">
        </div>

        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="e.g. Sarah Jenkins" required autocomplete="off">
        </div>


        <div class="form-group">
          <label for="department">Department</label>
          <input type="text" id="department" name="department" list="dept-list" placeholder="e.g. Mathematics" required>
          <datalist id="dept-list"></datalist>
        </div>

        <div class="form-group">
          <label for="gradeLevel">Grade Level</label>
          <input type="text" id="gradeLevel" name="gradeLevel" list="grade-list" placeholder="e.g. 10th Grade" required>
          <datalist id="grade-list"></datalist>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="s.jenkins@school.edu" required>
        </div>

        <div class="form-group">
          <label for="experience">Years of Experience</label>
          <input type="number" id="experience" name="experience" placeholder="0.0" required min="0" step="0.1">
        </div>

      </div>

      <div class="button-container">
        <button type="button" style="background: transparent; color: var(--text-muted);" onclick="google.script.host.close()">Cancel</button>
        <button type="submit" id="saveBtn">
          <span id="btnText">Save Record</span>
          <div id="loader" class="loader"></div>
        </button>
      </div>
    </form>
  </div>

  <div id="notification" class="notification"></div>

  <script>
    const form = document.getElementById('dataForm');
    const saveBtn = document.getElementById('saveBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');
    const notification = document.getElementById('notification');

    // Load initial data
    window.addEventListener('load', () => {
      google.script.run
        .withSuccessHandler(populateForm)
        .getFormData();
    });

    function populateForm(data) {
      document.getElementById('teacherId').value = data.nextId;
      
      // Populate Department Datalist
      const deptList = document.getElementById('dept-list');
      data.departments.forEach(dept => {
        const option = document.createElement('option');
        option.value = dept;
        deptList.appendChild(option);
      });

      // Populate Grade Level Datalist
      const gradeList = document.getElementById('grade-list');
      data.gradeLevels.forEach(grade => {
        const option = document.createElement('option');
        option.value = grade;
        gradeList.appendChild(option);
      });
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const data = {
        teacherId: document.getElementById('teacherId').value.trim(),
        fullName: document.getElementById('fullName').value.trim(),
        department: document.getElementById('department').value.trim(),
        gradeLevel: document.getElementById('gradeLevel').value.trim(),
        email: document.getElementById('email').value.trim(),
        experience: document.getElementById('experience').value
      };

      setLoading(true);

      google.script.run
        .withSuccessHandler(function(response) {
          setLoading(false);
          if (response.success) {
            showNotification('Teacher record saved successfully!', 'success');
            form.reset();
            // Refresh form for next entry
            google.script.run.withSuccessHandler(populateForm).getFormData();
          } else {
            showNotification('Error: ' + response.message, 'error');
          }
        })
        .withFailureHandler(function(err) {
          setLoading(false);
          showNotification('System error occurred.', 'error');
        })
        .saveData(data);
    });

    function setLoading(isLoading) {
      saveBtn.disabled = isLoading;
      btnText.style.display = isLoading ? 'none' : 'block';
      loader.style.display = isLoading ? 'flex' : 'none';
    }

    function showNotification(message, type) {
      notification.textContent = message;
      notification.className = 'notification ' + type;
      notification.style.display = 'block';
      
      setTimeout(() => {
        notification.style.display = 'none';
        if (type === 'success') {
          // Optional: close modal on success after delay
          // google.script.host.close();
        }
      }, 3000);
    }
  </script>
</body>
</html>
